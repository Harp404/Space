<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

scene.add(new THREE.AmbientLight(0xffffff,1.3));const a=new THREE.DirectionalLight(0xffffff,2.2);a.position.set(1,1,1);scene.add(a);const b=new THREE.DirectionalLight(0xffffff,1.1);b.position.set(-1,-0.4,-1);scene.add(b);

</script></body></html>

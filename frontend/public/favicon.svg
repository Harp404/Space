<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="e" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2b6cb0"/>
      <stop offset="60%" stop-color="#15407a"/>
      <stop offset="100%" stop-color="#0a1d3a"/>
